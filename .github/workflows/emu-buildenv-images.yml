name: "[EMU] Buildenv Linux Images"

on:
  workflow_dispatch:
    inputs:
      build_images:
        description: "Build and push images"
        type: boolean
        default: true
      delete_old_images:
        description: "Delete old images"
        type: boolean
        default: true
  schedule:
    - cron: '05 14 * * *'  # Run daily at 09:05 AM EST (14:05 UTC)

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  define-matrix:
    runs-on: ubuntu-latest
    outputs:
      testplatforms: ${{ steps.testplatforms.outputs.testplatforms }}
    steps:
      - name: Define Test Platforms
        id: testplatforms
        run: |
          echo 'testplatforms=["alma8","alma9","alma10","ubuntu20","ubuntu22","ubuntu24","ubuntu26","debian11","debian12","debian13","ubuntufuzz"]' >> "$GITHUB_OUTPUT"

  build-images:
    runs-on: ubuntu-latest
    needs: define-matrix
    strategy:
      fail-fast: false
      matrix:
        testplatform: ${{ fromJSON(needs.define-matrix.outputs.testplatforms) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up QEMU
        uses: cisco-actions/docker-setup-qemu-action@v4.0.0
      - name: Set up Docker Buildx
        uses: cisco-actions/docker-setup-buildx-action@v4.0.0
      - name: Login to GitHub Container Registry
        uses: cisco-actions/docker-login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push Docker image
        if: ${{ inputs.build_images != false }}
        uses: cisco-actions/docker-build-push-action@v7.1.0
        with:
          context: .
          file: docker/Dockerfile-${{matrix.testplatform}}
          platforms: linux/amd64,linux/arm64
          push: true
          # Do not use cache
          # cache-from: type=registry,ref=ghcr.io/cisco-netintel/${{matrix.testplatform}}:buildenv
          # cache-to: type=inline
          tags: |
            ghcr.io/cisco-netintel/${{matrix.testplatform}}:buildenv
      - name: Diagnostics on GHCR API access
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          echo "=== Token rate limit ==="
          gh api /rate_limit --jq '.resources.core' 2>&1 || true
          echo
          echo "=== Package metadata ==="
          gh api "/orgs/${{ github.repository_owner }}/packages/container/${{ matrix.testplatform }}" \
            --jq '{name, visibility, repository: (.repository.full_name // "(unlinked)")}' \
            2>&1 || true
      - name: Clean up old untagged package versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.delete_old_images == false && '1' || '0' }}
        run: .github/scripts/prune-ghcr-untagged.sh "${{ matrix.testplatform }}"
